## Homepage about
- id: "about_title"
  translation: "Who am I?"

- id: "about_content"
  translation: <p class="lead">
    Senior Data Engineer with 5+ years of experience specializing in Cloud Data Lakehouse
    architecture and scalable Fintech platforms. Expert in maintaining Snowflake infrastructure
    via Terraform and leading cross-functional engineering teams of 15+ to deliver high-impact
    data solutions.
    </p>
    <p class="lead">
    Proven track record in migrating complex legacy systems to modern stacks (Redshift to Snowflake),
    implementing automated CI/CD pipelines, and architecting Reverse ETL frameworks to drive
    business self-service. AWS Certified Solutions Architect with deep expertise in Apache Iceberg,
    PySpark, Kafka, and Airflow.
    </p>
    <p class="lead">
    Passionate about solving complex data engineering challenges, mentoring engineers, and
    enabling data-driven decision-making at scale across millions of users.
    </p>

- id: "about_button"
  translation: "About Me"

